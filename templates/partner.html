<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成為餐廳合作夥伴</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="back-arrow" class="back-arrow" onclick="animateBack()" title="返回上一頁">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <script>
    function animateBack() {
        const arrow = document.getElementById('back-arrow');
        arrow.classList.add('hide');
        setTimeout(() => window.history.back(), 400);
    }
    </script>
    <div class="form-container">
        <h2>成為餐廳合作夥伴</h2>
        {% if error %}
        <div style="color:red; margin-bottom:10px;">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label for="restaurant_name">餐廳名稱：</label>
            <input type="text" id="restaurant_name" name="restaurant_name" value="{{ restaurant_name|default('') }}" required><br>

            <label for="owner_phone">負責人電話：</label>
            <input type="text" id="owner_phone" name="owner_phone" value="{{ owner_phone|default('') }}" required><br>

            <label for="email">Email：</label>
            <input type="email" id="email" name="email" value="{{ email|default('') }}" required><br>

            <div style="margin:10px 0;">
                                <input type="checkbox" id="agree_terms" name="agree_terms" required>
                                <label for="agree_terms" style="display:inline;">我已閱讀並同意 <a href="#" onclick="showTerms();return false;">店家條款</a></label>
                                <div id="terms-modal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;">
                                    <div style="background:#fff;max-width:90vw;width:400px;max-height:80vh;overflow:auto;padding:24px 18px 18px 18px;border-radius:8px;box-shadow:0 2px 16px #0002;position:relative;">
                                        <h3 style="margin-top:0;">店家條款</h3>
                                        <pre id="terms-content" style="white-space:pre-wrap;font-size:1em;max-height:50vh;overflow:auto;background:#f8f8f8;padding:12px;border-radius:4px;"></pre>
                                        <button onclick="closeTerms()" style="margin-top:16px;">關閉</button>
                                    </div>
                                </div>
                                <script>
                                function showTerms() {
                                    var modal = document.getElementById('terms-modal');
                                    var content = document.getElementById('terms-content');
                                    modal.style.display = 'flex';
                                    fetch('/static/terms/store_terms.txt')
                                        .then(r => r.text())
                                        .then(t => { content.textContent = t; })
                                        .catch(() => { content.textContent = '無法載入條款內容'; });
                                }
                                function closeTerms() {
                                    document.getElementById('terms-modal').style.display = 'none';
                                }
                                </script>
            </div>

            <button type="submit" class="btn">送出</button>
        </form>
    </div>
</body>
</html>
