<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成為餐廳合作夥伴</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="back-arrow" class="back-arrow" onclick="animateBack()" title="返回上一頁">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <script>
    function animateBack() {
        const arrow = document.getElementById('back-arrow');
        arrow.classList.add('hide');
        setTimeout(() => window.history.back(), 400);
    }
    </script>
    <div class="form-container">
        <h2>成為餐廳合作夥伴</h2>
        {% if error %}
        <div style="color:red; margin-bottom:10px;">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label for="restaurant_name">餐廳名稱：</label>
            <input type="text" id="restaurant_name" name="restaurant_name" value="{{ restaurant_name|default('') }}" required><br>

            <label for="owner_phone">負責人電話：</label>
            <input type="text" id="owner_phone" name="owner_phone" value="{{ owner_phone|default('') }}" required><br>

            <label for="email">Email：</label>
            <input type="email" id="email" name="email" value="{{ email|default('') }}" required><br>

            <button type="submit" class="btn">送出</button>
        </form>
    </div>
</body>
</html>
