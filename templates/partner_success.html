<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>申請成功</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="back-arrow" class="back-arrow" onclick="animateBack()" title="返回上一頁">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <script>
    function animateBack() {
        const arrow = document.getElementById('back-arrow');
        arrow.classList.add('hide');
        setTimeout(() => window.history.back(), 400);
    }
    </script>
    <div class="form-container" style="text-align:center;">
        <h2 style="color:#4caf50;animation:pop-in 0.8s;">申請成功！</h2>
        <p>您的店家代碼已寄到 Email：<b>{{ email }}</b></p>
        <p>請用「餐廳名稱」當帳號、「店家代碼」當密碼登入店家後台。</p>
        <div style="margin:24px 0;">
            <span style="font-size:1.2em;">您的店家代碼：</span>
            <span style="font-size:1.5em;color:#f8b500;font-weight:bold;letter-spacing:2px;">{{ code }}</span>
        </div>
        <a href="/store_login"class="btn" style="width:auto; min-width:120px; display:inline-block; color:aliceblue">前往店家登入</a>
    </div>
</body>
</html>
