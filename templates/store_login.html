<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>店家登入</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="back-arrow" class="back-arrow" onclick="animateBack()" title="返回首頁">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <script>
    function animateBack() {
        const arrow = document.getElementById('back-arrow');
        arrow.classList.add('hide');
        setTimeout(() => window.location.href = '/', 400);
    }
    </script>
    <div class="form-container">
        <h2>店家登入</h2>
        <form action="/store_login" method="post">
            <label>餐廳名稱：<input type="text" name="name" required></label><br>
            <label>店家代碼：<input type="text" name="code" required></label><br>
            <button type="submit" class="btn" style="background:#2196f3;color:#fff;">登入</button>
        </form>
        {% if error %}<div style="color:red">{{ error }}</div>{% endif %}
    </div>
</body>
</html>
