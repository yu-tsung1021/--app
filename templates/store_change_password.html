<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>修改密碼</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="back-arrow" class="back-arrow" onclick="animateBack()" title="返回上一頁">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <script>
    function animateBack() {
        const arrow = document.getElementById('back-arrow');
        arrow.classList.add('hide');
        setTimeout(() => window.location.href = '/store_admin', 400);
    }
    </script>
    <div class="form-container" style="max-width:400px;">
        <h2>修改密碼</h2>
        {% if msg %}<div style="color:green">{{ msg }}</div>{% endif %}
        {% if error %}<div style="color:red">{{ error }}</div>{% endif %}
        <form action="/store_change_password" method="post" class="admin-form">
            <label>舊密碼：<input type="password" name="old_password" required></label>
            <label>新密碼：<input type="password" name="new_password" required></label>
            <button type="submit" class="btn" style="width:100%;background:#2196f3;">確認修改</button>
        </form>
    </div>
</body>
</html>
