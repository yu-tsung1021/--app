<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐廳菜單</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="back-arrow" class="back-arrow" onclick="animateBack()" title="返回餐廳列表">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <script>
    function animateBack() {
        const arrow = document.getElementById('back-arrow');
        arrow.classList.add('hide');
        setTimeout(() => window.location.href = '/user_home', 400);
    }
    </script>
    <div class="form-container">
        
        <h2>{{ store.name }}</h2>
        <div>{{ store.desc }}</div>
        {% if store.cover %}
            <img src="{{ store.cover }}" style="width:160px;max-width:90vw;max-height:120px;object-fit:cover;border-radius:8px;display:block;margin-bottom:12px;">
        {% endif %}
        <hr>
        <h3>菜單</h3>
        <div class="menu-list">
        {% for item in store.menu %}
            <div class="menu-card">
                <img src="{{ item.img }}" class="menu-img">
                <div class="menu-info">
                    <div class="menu-title">{{ item.name }}</div>
                    <div class="menu-price">${{ item.price }}</div>
                    <div class="menu-desc">{{ item.desc }}</div>
                </div>
            </div>
        {% endfor %}
        </div>
    </div>
</body>
</html>
