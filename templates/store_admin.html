<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>店家後台</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="form-container">
        {% if msg %}<div style="color:green">{{ msg }}</div>{% endif %}
        <div style="max-width:520px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:170px;margin-bottom:16px;">
                <h2 style="margin:0;">店家主頁設定</h2>
                <div style="display:flex;gap:12px;align-items:center;">
                    <a href="/store_change_password" class="change-password-btn-inline">修改密碼</a>
                    <a href="/" class="logout-btn-inline">登出</a>
                </div>
            </div>
            <form action="/store_admin" method="post" enctype="multipart/form-data" class="admin-form">
                <label>店家名稱：<input type="text" name="name" value="{{ store.name|default('') }}" required></label><br>
                <label>店家地址：<input type="text" name="address" value="{{ store.address|default('') }}" required></label><br>
                <label>營業開始：<input type="time" name="open_time" value="{{ store.open_time|default('') }}"></label>
                <label>營業結束：<input type="time" name="close_time" value="{{ store.close_time|default('') }}"></label><br>
                <label>主頁介紹：<textarea name="desc" required>{{ store.desc|default('') }}</textarea></label><br>
                    <label class="file-input-wrap">主頁圖片：
                        <input type="file" id="cover_img" name="cover" style="display:none;">
                        <button type="button" class="file-input-btn" onclick="document.getElementById('cover_img').click();">選擇圖片</button>
                        <span class="file-name" id="cover_img_name">尚未選擇檔案</span>
                    </label>
                        {% if store.cover %}<img src="{{ store.cover }}" id="cover_preview" style="max-width:120px;display:block;margin:8px 0;">{% else %}<img src="" id="cover_preview" style="max-width:120px;display:none;margin:8px 0;">{% endif %}
                <button type="submit" class="btn">儲存主頁</button>
            </form>
        </div>
        <hr>
        <h2>菜單管理</h2>
        <form action="/add_menu_item" method="post" enctype="multipart/form-data" class="admin-form" style="margin-bottom:16px;">
            <label>品名：<input type="text" name="item_name" required></label>
            <label>價格：<input type="number" name="item_price" required></label>
            <label>說明：<input type="text" name="item_desc" required></label>
            <label class="file-input-wrap">圖片：
                <input type="file" id="item_img" name="item_img" required style="display:none;">
                <button type="button" class="file-input-btn" onclick="document.getElementById('item_img').click();">選擇圖片</button>
                <span class="file-name" id="item_img_name">尚未選擇檔案</span>
            </label>
            <button type="submit" class="btn">新增菜單</button>
        </form>
        <script>
        document.getElementById('item_img').addEventListener('change', function(e){
            const el = document.getElementById('item_img_name');
            if (this.files && this.files.length>0) el.textContent = this.files[0].name;
            else el.textContent = '尚未選擇檔案';
        });
        document.getElementById('cover_img').addEventListener('change', function(e){
            const el = document.getElementById('cover_img_name');
            const preview = document.getElementById('cover_preview');
            if (this.files && this.files.length>0) {
                el.textContent = this.files[0].name;
                const reader = new FileReader();
                reader.onload = function(ev){
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(this.files[0]);
            } else {
                el.textContent = '尚未選擇檔案';
                preview.style.display = 'none';
            }
        });
        </script>
        <div class="menu-list">
                {% for item in store.menu %}
                        <div class="menu-card" style="position:relative;cursor:pointer;" onclick="openSurplusModal('{{ item.name|escape }}')">
                                <form method="post" action="/delete_menu_item" style="position:absolute;top:4px;right:8px;z-index:2;" onclick="event.stopPropagation();">
                                        <input type="hidden" name="item_name" value="{{ item.name }}">
                                        <button type="submit" style="background:none;border:none;color:#d00;font-size:1.2em;cursor:pointer;" title="刪除餐點" onclick="return confirm('確定要刪除此餐點嗎？');">×</button>
                                </form>
                                <img src="{{ item.img }}" class="menu-img"> 
                                <div class="menu-info">
                                        <div class="menu-title">{{ item.name }}</div>
                                        <div class="menu-price">${{ item.price }}</div>
                                        <div class="menu-desc">{{ item.desc }}</div>
                                        {% if item.surplus is defined %}
                                                <div style="color:#4caf50;font-size:0.95em;">剩餘：{{ item.surplus }} 份 (已發布)</div>
                                        {% endif %}
                                </div>
                        </div>
                {% endfor %}
                <!-- 剩餘數量 modal -->
                <div id="surplus-modal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.4);z-index:2000;align-items:center;justify-content:center;">
                    <form method="post" action="/publish_surplus" style="background:#fff;max-width:90vw;width:320px;padding:24px 18px 18px 18px;border-radius:8px;box-shadow:0 2px 16px #0002;position:relative;display:flex;flex-direction:column;align-items:center;">
                        <h3 style="margin-top:0;">發布剩餘數量</h3>
                        <input type="hidden" name="item_name" id="modal_item_name">
                        <label>剩餘份數：<input type="number" name="surplus" id="modal_surplus" min="1" required style="width:80px;"></label>
                        <div style="margin-top:16px;display:flex;gap:12px;">
                            <button type="submit" class="btn">發布</button>
                            <button type="button" onclick="closeSurplusModal()">取消</button>
                        </div>
                    </form>
                </div>
                <script>
                function openSurplusModal(itemName) {
                    document.getElementById('modal_item_name').value = itemName;
                    document.getElementById('modal_surplus').value = '';
                    document.getElementById('surplus-modal').style.display = 'flex';
                }
                function closeSurplusModal() {
                    document.getElementById('surplus-modal').style.display = 'none';
                }
                // 防止點擊 modal 外部關閉
                document.getElementById('surplus-modal').addEventListener('click', function(e){
                    if(e.target === this) closeSurplusModal();
                });
                </script>
        </div>
    </div>
</body>
</html>
