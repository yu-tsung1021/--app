<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>註冊成功</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="back-arrow" class="back-arrow" onclick="animateBack()" title="返回首頁">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <script>
    function animateBack() {
        const arrow = document.getElementById('back-arrow');
        arrow.classList.add('hide');
        setTimeout(() => window.location.href = '/', 400);
    }
    </script>
    <div class="form-container">
        <h2 style="color:green;">註冊成功！</h2>
        <div style="text-align:center; margin-top:18px;">
            <a href="/login" class="btn" style="width:auto; min-width:120px; display:inline-block; color:aliceblue">立即登入</a>
        </div>
    </div>
</body>
</html>
