<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食餐廳總覽</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .store-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .store-card {
            margin-bottom: 0 !important;
        }

        @media (max-width: 768px) {
            .store-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="back-arrow" class="back-arrow" onclick="animateBack()" title="返回上一頁">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <script>
    function animateBack() {
        const arrow = document.getElementById('back-arrow');
        arrow.classList.add('hide');
        setTimeout(() => window.history.back(), 400);
    }
    </script>
    <div class="form-container">
        <h2>所有餐廳</h2>
        <div class="store-list">
        {% for store in stores %}
            <div class="store-card" style="display:flex;align-items:center;gap:18px;margin-bottom:18px;background:#fff;border-radius:12px;box-shadow:0 2px 8px #0001;padding:12px 18px;">
                <a href="/store/{{ store.code }}" style="display:flex;align-items:center;gap:18px;text-decoration:none;color:inherit;width:100%;">
                    {% if store.cover %}
                        <img src="{{ store.cover }}" class="store-cover" style="width:120px;height:90px;object-fit:cover;border-radius:8px;flex-shrink:0;">
                    {% else %}
                        <div style="width:120px;height:90px;background:#eee;border-radius:8px;flex-shrink:0;"></div>
                    {% endif %}
                    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
                        <div class="store-name" style="font-size:1.2em;font-weight:bold;margin-bottom:6px;">{{ store.name }}</div>
                        <div class="store-desc" style="color:#666;">{{ store.desc }}</div>
                    </div>
                </a>
            </div>
        {% endfor %}
        </div>
    </div>
</body>
</html>
